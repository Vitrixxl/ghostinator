<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Social · Dossier Technique · GS-001</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper-deep: #06091a;
    --paper:      #0a0f24;
    --paper-soft: #0d142d;
    --paper-warm: #131a37;
    --paper-card: rgba(239,229,208,0.025);

    --ink:        #f0e6d0;
    --ink-soft:   #c8bea8;
    --ink-dim:    #8c8576;
    --ink-faint:  #4f4d44;
    --ink-ghost:  rgba(240,230,208,0.08);

    --hot:        #ff4f2e;
    --hot-deep:   #c93410;
    --hot-glow:   rgba(255,79,46,0.2);

    --gold:       #d4a554;
    --gold-deep:  #8a6420;
    --rule:       rgba(240,230,208,0.10);
    --rule-mid:   rgba(240,230,208,0.18);
    --rule-strong:rgba(240,230,208,0.32);

    --plate-cf:   #ff8a3d;
    --plate-supa: #6ad6a6;
    --plate-hetz: #ff7080;
    --plate-bunny:#ffae5e;
    --plate-scw:  #c98aff;
    --plate-info: #6ec5ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--paper-deep);
    color: var(--ink);
    font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif;
    font-size: 20px;
    line-height: 1.55;
    font-feature-settings: "ss01", "ss02", "calt", "liga";
    text-rendering: geometricPrecision;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.94  0 0 0 0 0.90  0 0 0 0 0.82  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.10;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 5;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 35%, transparent 0%, transparent 55%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 4;
  }

  #root, .dossier { width: 100vw; height: 100vh; position: relative; }

  .display { font-family: 'Instrument Serif', 'Cormorant Garamond', serif; font-style: italic; letter-spacing: -0.018em; line-height: 0.92; }
  .editorial { font-family: 'Fraunces', serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-feature-settings: "calt", "ss01"; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.22em; color: var(--ink-dim); font-weight: 500; }
  .small-caps { font-variant-caps: all-small-caps; letter-spacing: 0.12em; font-weight: 500; }
  .hot { color: var(--hot); }
  .gold { color: var(--gold); }
  .dim { color: var(--ink-dim); }
  .soft { color: var(--ink-soft); }

  .crop { position: fixed; width: 18px; height: 18px; border-color: var(--rule-mid); z-index: 10; pointer-events: none; }
  .crop.tl { top: 14px; left: 14px; border-top: 1px solid var(--rule-mid); border-left: 1px solid var(--rule-mid); }
  .crop.tr { top: 14px; right: 14px; border-top: 1px solid var(--rule-mid); border-right: 1px solid var(--rule-mid); }
  .crop.bl { bottom: 14px; left: 14px; border-bottom: 1px solid var(--rule-mid); border-left: 1px solid var(--rule-mid); }
  .crop.br { bottom: 14px; right: 14px; border-bottom: 1px solid var(--rule-mid); border-right: 1px solid var(--rule-mid); }

  .chrome-top, .chrome-bot {
    position: fixed; left: 40px; right: 40px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 20; pointer-events: none; color: var(--ink-dim);
  }
  .chrome-top { top: 22px; }
  .chrome-bot { bottom: 22px; }
  .chrome-top::after, .chrome-bot::after {
    content: ''; position: absolute; left: 60px; right: 60px; height: 1px; background: var(--rule);
  }
  .chrome-top::after { bottom: -8px; }
  .chrome-bot::after { top: -8px; }
  .chrome .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--hot); display: inline-block; vertical-align: middle; margin-right: 8px; box-shadow: 0 0 12px var(--hot-glow); }

  .stage { position: absolute; inset: 70px 60px 70px 60px; display: flex; }
  .slide-content { width: 100%; display: flex; flex-direction: column; position: relative; }

  .section-eyebrow { display: flex; align-items: baseline; gap: 1.2em; margin-bottom: 0.6em; }
  .section-eyebrow .num { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.2rem; color: var(--gold); }
  .section-eyebrow .lab { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.22em; color: var(--ink-dim); }
  .section-eyebrow .meta { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--ink-faint); letter-spacing: 0.18em; text-transform: uppercase; }

  h1.headline { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-size: clamp(3.4rem, 8.5vw, 7rem); letter-spacing: -0.03em; line-height: 0.92; margin-bottom: 0.3em; }
  h2.title { font-family: 'Fraunces', serif; font-weight: 400; font-size: clamp(1.6rem, 3.4vw, 2.6rem); letter-spacing: -0.012em; line-height: 1.05; margin-bottom: 0.8em; font-variation-settings: 'opsz' 96, 'SOFT' 0; }
  h2.title em { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; color: var(--gold); }
  h3.minor { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-dim); margin: 1.4em 0 0.5em; }

  .lede { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(1.05rem, 1.55vw, 1.3rem); line-height: 1.5; color: var(--ink-soft); max-width: 70ch; font-variation-settings: 'opsz' 24; }
  .lede em { color: var(--ink); font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }

  .stamp {
    display: inline-flex; align-items: center; gap: 0.5em;
    padding: 0.5em 1.05em; border: 2px solid var(--hot); color: var(--hot);
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
    border-radius: 3px; background: rgba(255,79,46,0.04);
    box-shadow: 0 0 0 6px rgba(255,79,46,0.04), 0 0 24px rgba(255,79,46,0.08);
    transform: rotate(-3deg);
  }
  .stamp.gold { border-color: var(--gold); color: var(--gold); background: rgba(212,165,84,0.04); }
  .stamp.flat { transform: none; }
  .stamp.float-tr { position: absolute; top: 0; right: 0; }

  .cover { display: grid; grid-template-columns: 1fr 320px; gap: 4vw; height: 100%; }
  .cover .left { display: flex; flex-direction: column; justify-content: space-between; }
  .cover .right { display: flex; flex-direction: column; align-items: flex-end; gap: 1em; padding-top: 2em; }
  .cover-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(5rem, 14vw, 12rem); letter-spacing: -0.04em; line-height: 0.84; }
  .cover-title .line2 { display: block; padding-left: 1.8em; color: var(--ink-soft); }
  .cover-toc { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--ink-soft); border-top: 1px solid var(--rule); padding-top: 1em; }
  .cover-toc-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 1em; padding: 0.42em 0; border-bottom: 1px solid var(--rule); align-items: baseline; }
  .cover-toc .num { color: var(--gold); }
  .cover-toc .pg { color: var(--ink-dim); }
  .cover-spec { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-soft); border: 1px solid var(--rule-mid); padding: 0.6em 1em; border-radius: 2px; background: var(--paper-card); }
  .cover-spec .v { color: var(--ink); margin-left: 0.6em; }
  .cover-spec.primary { border-color: var(--hot); color: var(--hot); }

  .constraint-grid { display: grid; grid-template-columns: 60px 200px 1fr; gap: 0.4em 1.5em; margin-top: 1em; border-top: 1px solid var(--rule); }
  .constraint-row { display: contents; }
  .constraint-row > div { padding: 1em 0; border-bottom: 1px solid var(--rule); }
  .constraint-row .greek { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 2.4rem; color: var(--hot); line-height: 1; }
  .constraint-row .name { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--ink); font-weight: 700; align-self: center; }
  .constraint-row .body { font-family: 'Fraunces', serif; color: var(--ink-soft); font-variation-settings: 'opsz' 16; }
  .constraint-row .body strong { color: var(--ink); font-weight: 600; }

  .reject-stack { margin-top: 1.4em; }
  .reject-row { display: grid; grid-template-columns: 32px 220px 1fr 90px; gap: 1em; padding: 0.55em 0; border-bottom: 1px solid var(--rule); align-items: baseline; }
  .reject-row .x { color: var(--hot); font-family: 'Instrument Serif', serif; font-size: 1.4rem; line-height: 1; }
  .reject-row .label { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--ink); font-weight: 500; }
  .reject-row .reason { font-family: 'Fraunces', serif; color: var(--ink-dim); font-style: italic; }
  .reject-row .tag { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--hot); border: 1px solid var(--hot); padding: 0.18em 0.6em; border-radius: 2px; justify-self: end; }

  .arch { display: flex; flex-direction: column; align-items: center; gap: 0.8em; width: 100%; max-width: 1100px; margin: 0 auto; flex: 1; justify-content: center; position: relative; }
  .arch-grid { position: absolute; inset: -20px; background-image: linear-gradient(var(--ink-ghost) 1px, transparent 1px), linear-gradient(90deg, var(--ink-ghost) 1px, transparent 1px); background-size: 28px 28px; opacity: 0.4; pointer-events: none; mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%); }

  .plate { border: 1px solid var(--rule-strong); background: var(--paper-card); padding: 0.7em 1.05em; min-width: 240px; text-align: center; position: relative; border-radius: 2px; }
  .plate-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 0.98rem; color: var(--ink); letter-spacing: -0.005em; }
  .plate-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-dim); margin-top: 0.25em; letter-spacing: 0.04em; line-height: 1.4; }
  .plate.client { background: rgba(110,197,255,0.05); border-color: var(--plate-info); min-width: 280px; }
  .plate.client .plate-title { color: var(--plate-info); }

  .layer { width: 100%; border: 1px solid var(--rule-strong); border-radius: 2px; padding: 1.2em 1.2em 1em; background: var(--paper-card); position: relative; }
  .layer-tab { position: absolute; top: -10px; left: 1.2em; background: var(--paper-deep); padding: 0 0.6em; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); z-index: 1; }
  .layer-row { display: flex; gap: 0.7em; flex-wrap: wrap; justify-content: center; }
  .layer.cf { border-color: var(--plate-cf); }
  .layer.cf .layer-tab { color: var(--plate-cf); }
  .layer.cf .plate { border-color: var(--plate-cf); background: rgba(255,138,61,0.04); }
  .layer.bunny { border-color: var(--plate-bunny); }
  .layer.bunny .layer-tab { color: var(--plate-bunny); }
  .layer.bunny .plate { border-color: var(--plate-bunny); background: rgba(255,174,94,0.04); }
  .layer.hetz { border-color: var(--plate-hetz); }
  .layer.hetz .layer-tab { color: var(--plate-hetz); }
  .layer.hetz .plate { border-color: var(--plate-hetz); background: rgba(255,112,128,0.04); }
  .layer.privnet { border: 1px dashed var(--plate-info); background: rgba(110,197,255,0.025); }
  .layer.privnet .layer-tab { color: var(--plate-info); }
  .layer.supa { border-color: var(--plate-supa); }
  .layer.supa .layer-tab { color: var(--plate-supa); }
  .layer.supa .plate { border-color: var(--plate-supa); background: rgba(106,214,166,0.04); }
  .layer.scw { border-color: var(--plate-scw); }
  .layer.scw .layer-tab { color: var(--plate-scw); }
  .layer.scw .plate { border-color: var(--plate-scw); background: rgba(201,138,255,0.04); }

  .connector { width: 1px; height: 36px; background: var(--rule-mid); position: relative; }
  .connector::after { content: ''; position: absolute; bottom: 0; left: -3px; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 6px solid var(--rule-mid); }
  .connector .label { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--ink-dim); letter-spacing: 0.06em; white-space: nowrap; }

  .ip-fence { display: inline-flex; align-items: center; gap: 0.6em; padding: 0.35em 0.9em; background: rgba(255,79,46,0.06); border: 1px dashed var(--hot); border-radius: 2px; color: var(--hot); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .ip-fence .dot { width: 6px; height: 6px; background: var(--hot); border-radius: 50%; box-shadow: 0 0 10px var(--hot-glow); }

  .dim-line { position: relative; height: 14px; border-top: 1px solid var(--ink-faint); margin-top: 0.4em; }
  .dim-line::before, .dim-line::after { content: ''; position: absolute; top: -4px; width: 1px; height: 9px; background: var(--ink-faint); }
  .dim-line::before { left: 0; }
  .dim-line::after { right: 0; }
  .dim-line .v { position: absolute; top: -1.2em; left: 50%; transform: translateX(-50%); background: var(--paper-deep); padding: 0 0.4em; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--ink-dim); letter-spacing: 0.1em; }

  .worker { flex: 1; min-width: 230px; border: 1px solid var(--plate-hetz); background: rgba(255,112,128,0.03); border-radius: 2px; padding: 0.6em; }
  .worker-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.5em; border-bottom: 1px dashed var(--rule); padding-bottom: 0.4em; }
  .worker-head .nm { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.1rem; color: var(--plate-hetz); }
  .worker-head .badge { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--ink-dim); letter-spacing: 0.08em; }
  .pod-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4em; }
  .pod { background: rgba(255,138,61,0.06); border: 1px solid var(--plate-cf); border-radius: 2px; padding: 0.5em; text-align: center; }
  .pod .nm { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--plate-cf); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .pod .stack { font-family: 'Fraunces', serif; font-size: 0.78rem; color: var(--ink-soft); margin-top: 0.15em; font-variation-settings: 'opsz' 12; line-height: 1.3; }

  .data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7em; width: 100%; }

  .ladder { display: grid; grid-template-columns: 130px 200px 1fr 140px; gap: 0; margin-top: 1em; border-top: 1px solid var(--rule); }
  .ladder > div { padding: 1em 0.8em; border-bottom: 1px solid var(--rule); }
  .ladder .head { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-dim); border-bottom: 1px solid var(--rule-mid); padding-bottom: 0.6em; }
  .ladder .palier { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.5rem; color: var(--ink); line-height: 1; }
  .ladder .neck { font-family: 'Fraunces', serif; color: var(--ink-soft); }
  .ladder .sol { font-family: 'Fraunces', serif; color: var(--ink); font-style: italic; font-weight: 400; }
  .ladder .cost { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.4rem; color: var(--gold); text-align: right; line-height: 1; }
  .ladder .cost.zero { color: var(--ink); }

  .partners { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1em; margin-top: 1.4em; }
  .partner { border: 1px solid var(--rule-strong); border-top: 2px solid var(--gold); padding: 1.2em 1em; background: var(--paper-card); position: relative; min-height: 165px; }
  .partner .flag { position: absolute; top: 0; right: 0; background: var(--paper-deep); border: 1px solid var(--rule); border-right: none; border-top: none; padding: 0.3em 0.6em; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.1em; }
  .partner .pn { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.7rem; color: var(--ink); margin-bottom: 0.1em; line-height: 1; }
  .partner .role { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.7em; }
  .partner .desc { font-family: 'Fraunces', serif; font-size: 0.85rem; color: var(--ink-soft); line-height: 1.45; font-variation-settings: 'opsz' 14; }
  .partner .price { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--gold); margin-top: 0.5em; font-size: 1.05rem; }

  .rust-quote { margin-top: 1.4em; padding: 1em 1.4em; border-left: 2px solid var(--hot); background: rgba(255,79,46,0.04); }
  .rust-quote .q { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.4rem; color: var(--ink); line-height: 1.2; }
  .rust-quote .reasons { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5em; margin-top: 0.8em; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--ink-soft); }
  .rust-quote .reasons strong { color: var(--hot); display: block; margin-bottom: 0.2em; letter-spacing: 0.08em; }

  .compare { display: grid; grid-template-columns: 200px 1fr 1fr; margin-top: 0.8em; border-top: 1px solid var(--rule); }
  .compare .head { padding: 1em 1em 0.8em; border-bottom: 1px solid var(--rule-mid); }
  .compare .head:nth-child(1) { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .compare .head.h-a { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.4rem; color: var(--plate-cf); border-left: 1px solid var(--rule); }
  .compare .head.h-b { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.4rem; color: var(--plate-hetz); border-left: 1px solid var(--rule); }
  .compare .row-label { padding: 0.9em 1em; border-bottom: 1px solid var(--rule); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-dim); }
  .compare .col-a, .compare .col-b { padding: 0.9em 1em; border-bottom: 1px solid var(--rule); border-left: 1px solid var(--rule); font-family: 'Fraunces', serif; color: var(--ink-soft); font-size: 0.95rem; font-variation-settings: 'opsz' 14; }
  .compare .col-a strong, .compare .col-b strong { color: var(--ink); font-weight: 500; }

  .tradeoffs { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 0.9em; margin-top: 1em; }
  .tradeoff { border: 1px solid var(--rule-strong); background: var(--paper-card); padding: 1.2em 1.1em 1em; position: relative; border-top: 2px solid var(--hot); }
  .tradeoff .ro { position: absolute; top: -1em; right: 0.9em; background: var(--paper-deep); padding: 0 0.4em; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.5rem; color: var(--hot); line-height: 1; }
  .tradeoff h4 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 1.05rem; color: var(--ink); margin-bottom: 0.4em; line-height: 1.2; font-variation-settings: 'opsz' 24; }
  .tradeoff p { font-family: 'Fraunces', serif; font-size: 0.86rem; color: var(--ink-soft); line-height: 1.45; font-variation-settings: 'opsz' 12; }
  .tradeoff p em { color: var(--gold); font-style: italic; }

  .observation { margin-top: auto; padding-top: 1em; border-top: 1px dashed var(--rule); display: flex; gap: 1em; align-items: flex-start; }
  .observation .obs-tag { flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.22em; color: var(--gold); padding-top: 2px; width: 110px; }
  .observation .obs-body { font-family: 'Fraunces', serif; font-style: italic; font-size: 0.85rem; color: var(--ink-dim); font-variation-settings: 'opsz' 12; max-width: 84ch; line-height: 1.5; }

  .end-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; position: relative; }
  .end-slide .question { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(5rem, 14vw, 12rem); color: var(--gold); line-height: 0.9; letter-spacing: -0.04em; }
  .end-slide .question .mark { color: var(--hot); }
  .end-slide .closing { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(1.05rem, 1.55vw, 1.4rem); color: var(--ink-soft); margin-top: 1.5em; max-width: 60ch; line-height: 1.5; font-variation-settings: 'opsz' 24; }
  .end-slide .closing em { color: var(--ink); font-family: 'Instrument Serif', serif; font-style: italic; }
  .end-pills { display: flex; gap: 0.6em; flex-wrap: wrap; justify-content: center; margin-top: 3em; }
  .end-pills .p { border: 1px solid var(--rule-strong); padding: 0.5em 1em; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; color: var(--ink-soft); background: var(--paper-card); }

  .progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--hot); box-shadow: 0 0 12px var(--hot-glow); z-index: 100; transition: width 350ms cubic-bezier(0.4,0,0.2,1); }
  .nav-hint { position: fixed; bottom: 22px; left: 60px; z-index: 25; pointer-events: none; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--ink-faint); letter-spacing: 0.12em; }
  .nav-hint kbd { border: 1px solid var(--rule); padding: 1px 5px; border-radius: 2px; color: var(--ink-soft); margin: 0 1px; background: var(--paper-card); }

  .boot { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5em; color: var(--ink-soft); }
  .boot .anim { width: 80px; height: 1px; background: var(--rule); position: relative; overflow: hidden; }
  .boot .anim::before { content: ''; position: absolute; inset: 0; background: var(--hot); animation: loadbar 1.6s ease-in-out infinite; }
  @keyframes loadbar { 0% { transform: translateX(-100%); } 50% { transform: translateX(0%); } 100% { transform: translateX(100%); } }
  .boot .label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; }

  @media (max-width: 980px) {
    .stage { inset: 60px 30px 60px 30px; }
    .chrome-top, .chrome-bot { left: 18px; right: 18px; }
    .nav-hint { left: 20px; }
    .cover { grid-template-columns: 1fr; }
    .cover-title { font-size: clamp(4rem, 18vw, 7rem); }
    .partners, .tradeoffs, .compare { grid-template-columns: 1fr !important; }
    .reject-row { grid-template-columns: 24px 1fr 80px; }
    .reject-row .reason { display: none; }
    .ladder { grid-template-columns: 1fr 1fr; }
    .layer-row { flex-direction: column; }
    .data-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root">
  <div class="boot">
    <div class="anim"></div>
    <div class="label">Préparation du dossier…</div>
  </div>
</div>

<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>
